name: Terraform LocalStack

on:
  push:
    branches:
      - main

jobs:
  terraform:
    runs-on: ubuntu-latest

    services:
      localstack:
        image: localstack/localstack:latest
        ports:
          - 4566:4566
        env:
          SERVICES: dynamodb,s3,sns,sqs,lambda,apigateway
          DEBUG: 1

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1

    steps:
      - uses: actions/checkout@v4

      - name: Wait for LocalStack
        run: sleep 15 

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Install Terraform
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip
          wget https://releases.hashicorp.com/terraform/1.6.6/terraform_1.6.6_linux_amd64.zip
          unzip terraform_1.6.6_linux_amd64.zip
          sudo mv terraform /usr/local/bin/

      - name: Debug Variables
        run: |
          echo "Table name length:=============== ${#TF_VAR_table_name}"
          echo "Hash key length:================== ${#TF_VAR_hash_key}"
      - name: Show project structure
        run: ls -R   

      - name: Terraform Init
        run: terraform init
        working-directory: infra/environments/dev

      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: infra/environments/dev

      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: infra/environments/dev

      - name: Export SQS_QUEUE_URL
        run: echo "SQS_QUEUE_URL=$(terraform output -raw queue_url)" >> $GITHUB_ENV
        working-directory: infra/environments/dev

      - name: Export SNS_TOPIC_ARN
        run: echo "SNS_TOPIC_ARN=$(terraform output -raw topic_arn)" >> $GITHUB_ENV
        working-directory: infra/environments/dev

      - name: Export Lambda ARN
        run: echo "SHARED_LAMBDA_ARN=$(terraform output -raw shared_lambda_arn)" >> $GITHUB_ENV

      - name: List tables in LocalStack
        run: |
          aws dynamodb list-tables \
            --endpoint-url=http://localhost:4566 \
            --region us-east-1
